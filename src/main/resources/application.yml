spring:
  application:
    name: whereabouts-api
  jpa:
    open-in-view: false
    show-sql: false
    generate-ddl: false
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

  datasource:
    url: 'jdbc:h2:mem:whereabouts-api-db;MODE=PostgreSQL'
    continue-on-error: true

    hikari:
      pool-name: OffenderActivity-CP
      connectionTimeout: 2000
      validationTimeout: 500

  jackson:
    date-format: "yyyy-MM-dd HH:mm:ss"

  http:
    converters:
      preferred-json-mapper: jackson2

  h2:
    console:
      enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${oauth.endpoint.url}/.well-known/jwks.json
      client:
        registration:
          elite2-api:
            provider: hmpps-auth
            client-id: ${oauth.client.id}
            client-secret: ${oauth.client.secret}
            authorization-grant-type: client_credentials
            scope: write
          case-note-api:
            provider: hmpps-auth
            client-id: ${system.client.id}
            client-secret: ${system.client.secret}
            authorization-grant-type: client_credentials
            scope: read,write
        provider:
          hmpps-auth:
            token-uri: ${oauth.endpoint.url}/oauth/token

  codec:
    max-in-memory-size: 10MB


  profiles:
    group:
      test:
        - "dev"
      dev-local:
        - "dev"
        - "postgres"
        - "local"
        - "localstack"
server:
  port: 8082
  servlet:
    context-path: /
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
  shutdown: graceful

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: 'info, health, ping'
  endpoint:
    health:
      cache:
        time-to-live: 2000ms
      show-components: always
      show-details: always
      probes:
        enabled: true
    info:
      cache:
        time-to-live: 2000ms
  info:
    env:
      enabled: true

service:
   whereabouts-disabled: ${WHEREABOUTS_DISABLED:WDI,LPI}
